<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <script type="module" src="popup.js"></script>
</head>
<body>

  <div class="sky-container" id="skyContainer">
    <div id="skyNoteLayer" class="sky-note-layer"></div>
    <div id="audioVisualizer" class="visualizer-container"></div>

    <div class="sky-info">
      <p class="label">Now playing:</p>
      <h2 id="skyTitle" class="scrolling-text">Nothing playing</h2>
    </div>

    <div class="jukebox-wrapper" id="jukeboxContainer">
      <div id="particleSystem"></div>
      
      <img src="../../assets/jukebox.png" class="jukebox-img">
      
      <div class="status-overlay" id="statusOverlay">
        <img src="../../assets/play_icon.png">
      </div>
    </div>
  </div>

  <div class="card">
    <div id="importNotice" class="import-notice hidden">
      <p>To use the player, you must import the game songs in <strong>Settings</strong> first.</p>
      <button id="btnNoticeConfig" class="notice-btn">Go to Settings</button>
      <button id="btnDismissNotice" class="notice-dismiss" title="Close">×</button>
    </div>

    <div class="top-bar">
      <div class="search-box">
        <img src="../../assets/search.png" class="icon-ui">
        <input type="text" id="searchInput" placeholder="Search..." title="Search songs">
      </div>
      <button id="btnReload" class="icon-btn" title="Restart">
        <img src="../../assets/reload.png" class="icon-ui">
      </button>
      <button id="btnSettings" class="icon-btn" title="Settings">
        <img src="../../assets/settings.png" class="icon-ui">
      </button>
    </div>

    <div class="track-info">
      <h3 id="trackTitle">Select a song</h3>
    </div>

    <div class="progress-wrapper">
      <span id="currTime">0:00</span>
      <input type="range" id="progressBar" value="0" min="0" step="1" title="Seek">
      <span id="totTime">0:00</span>
    </div>

    <div class="controls">
      <button id="btnPrev" class="ctrl-btn small" title="Previous track">⏮</button>
      <button id="btnPlayPause" class="ctrl-btn big" title="Play / Pause">▶</button>
      <button id="btnNext" class="ctrl-btn small" title="Next track">⏭</button>
    </div>

    <div class="shuffle-section">
      <button id="btnShuffle" class="shuffle-btn" title="Change playback mode (random / sequential)">
        <img src="../../assets/shuffle.png" class="icon-shuffle">
        <span id="shuffleText">Random: OST</span>
      </button>
    </div>

    <div class="volume-wrapper">
      <img src="../../assets/volume.png" id="volumeIcon" class="icon-ui" title="Mute / Unmute">
      <input type="range" id="volumeBar" min="0" max="1" step="0.05" value="1" title="Volume">
    </div>

    <div id="searchResultsContainer" class="search-results-container hidden">
      <ul id="searchResultsList" class="scroll-list search-results-list"></ul>
    </div>

    <div class="library" id="librarySection">
      
      <details id="detDiscs" class="library-details">
        <summary class="radio-header">
          <div class="header-title header-title-library">
            <img src="../../assets/disc_icon.png" class="icon-library"> 
            <span>Music Discs (<span id="cntDiscs">0</span>)</span>
          </div>
          <span class="arrow">▼</span>
        </summary>
        <ul id="listDiscs" class="scroll-list"></ul>
      </details>
      
      <div class="library-spacer"></div>
      
      <details id="detOst" class="library-details">
        <summary class="radio-header">
          <div class="header-title header-title-library">
            <img src="../../assets/piano.png" class="icon-library">
            <span>Soundtrack (<span id="cntOst">0</span>)</span>
          </div>
          <span class="arrow">▼</span>
        </summary>
        <ul id="listOst" class="scroll-list"></ul>
      </details>

    </div>

</body>
</html>
